services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vetkb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetkb_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vetkb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetkb}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-vetkb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetkb_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vetkb}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret-at-least-32-chars}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@vetkb.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      YANDEX_GPT_API_KEY: ${YANDEX_GPT_API_KEY:-}
      YANDEX_GPT_FOLDER_ID: ${YANDEX_GPT_FOLDER_ID:-}
      YANDEX_GPT_MODEL: ${YANDEX_GPT_MODEL:-yandexgpt-lite/latest}
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./backend
          target: /build
          ignore:
            - tmp/

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8080
      VOICE_URL: http://voice-agent:7860
    depends_on:
      - backend
      - voice-agent
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src

  voice-agent:
    build:
      context: ./voice-agent
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BACKEND_URL: http://backend:8080
      TTS_VOICE: ${TTS_VOICE:-ash}
      DEFAULT_COMPANY_ID: ${DEFAULT_COMPANY_ID:-1}
    depends_on:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
