services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vetkb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetkb_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vetkb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetkb}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-vetkb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetkb_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vetkb}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret-at-least-32-chars}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@vetkb.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./backend
          target: /build
          ignore:
            - tmp/

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
